<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://smlqigkadxnmtpexpwsq.supabase.co; img-src 'self' data:; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#0b3d39">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BBT Survey">
  <title>Admin | รพ.บางบัวทอง</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <div class="brand-kicker">Survey Admin</div>
        <h1>ผลประเมินโครงการปฐมนิเทศ 2569</h1>
        <p class="subtitle">รพ.บางบัวทอง</p>
      </div>
      <div class="actions no-print">
        <a class="button secondary" href="report.html">ดูรายงานพิมพ์</a>
        <button id="logout" class="ghost" type="button">ออกจากระบบ</button>
      </div>
    </header>

    <section id="gate" class="card narrow">
      <h2>เข้าสู่ระบบ</h2>
      <form id="key-form">
        <label for="master-key">Master Key</label>
        <div class="password-field">
          <input id="master-key" type="password" autocomplete="off" required>
          <button class="toggle-password" type="button" data-target="master-key" aria-label="แสดง Master Key" aria-pressed="false">
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M2.7 12s3.4-6.2 9.3-6.2 9.3 6.2 9.3 6.2-3.4 6.2-9.3 6.2S2.7 12 2.7 12Z"></path>
              <circle cx="12" cy="12" r="2.8"></circle>
            </svg>
          </button>
        </div>
        <div class="actions">
          <button class="primary" type="submit">เข้าสู่ระบบ</button>
          <span id="gate-message" class="small"></span>
        </div>
      </form>
    </section>

    <section id="dashboard" class="dashboard-layout hidden">
      <div class="stats-grid executive-strip">
        <div class="card metric"><div class="muted">จำนวนคำตอบ</div><div id="response-count" class="metric-value">0</div></div>
        <div class="card metric"><div class="muted">ความพึงพอใจโดยรวม</div><div id="overall-mean" class="metric-value">-</div></div>
      </div>

      <section class="card dashboard-primary">
        <h2>ค่าเฉลี่ยรายหัวข้อ</h2>
        <canvas id="means-chart" height="240"></canvas>
      </section>

      <section class="card dashboard-side">
        <h2>ข้อมูลแยกตามตำแหน่ง</h2>
        <div id="role-breakdown"></div>
      </section>

      <section class="card dashboard-wide">
        <h2>ตารางการกระจายคะแนน</h2>
        <div id="summary-table" class="table-wrap"></div>
      </section>

      <section class="card dashboard-wide">
        <h2>ความคิดเห็นและข้อเสนอแนะ</h2>
        <div id="comments"></div>
      </section>

      <section class="dashboard-actions no-print">
        <div class="actions">
          <button id="excel" class="primary" type="button">ดาวน์โหลด Excel</button>
          <a class="button secondary" href="report.html">ดูรายงานพิมพ์</a>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <script src="survey-data.js"></script>
  <script src="admin.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
